# Activated on Railway via SPRING_PROFILES_ACTIVE=prod
#
# Railway's filesystem is ephemeral, so the file-based H2 DB from
# application.properties won't survive a redeploy/restart. Use the
# Railway Postgres addon instead, which persists data properly.
#
# Railway's Postgres plugin exposes PGHOST/PGPORT/PGDATABASE/PGUSER/
# PGPASSWORD (alongside a combined DATABASE_URL) as environment
# variables on any service you reference it from - build the JDBC
# URL from those.
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Don't expose the H2 web console in production
spring.h2.console.enabled=false

# Import runs once on cold start and is safe to leave on: both importers
# skip rows that already exist (by external id / name+brand / name+price),
# so re-running against an already-seeded Postgres database is a fast
# no-op rather than a duplicate import. Once you've confirmed the first
# deploy seeded the database, you can set SAMZONE_IMPORT_ON_STARTUP=false
# in Railway's env vars to skip the existence-check scan on every restart.
samzone.import.on-startup=true
